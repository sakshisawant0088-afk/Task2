<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Grade System</title>
</head>
<body>
   <input type="number" id="marks" placeholder="Enter marks">
   <button onclick="checkGrade()">CheckGrade</button>

    <h2 id="result"></h2>
   <script>

    function checkGrade() {
    let marks = parseInt(document.getElementById("marks").value);

    if (marks >= 90) {
        document.getElementById("result").innerHTML = "Grade A+";
    }
    else if (marks >= 80) {
        document.getElementById("result").innerHTML = "Grade A";
    }
    else if (marks >= 70) {
        document.getElementById("result").innerHTML = "Grade B";
    }
    else if (marks >= 60) {
        document.getElementById("result").innerHTML = "Grade C";
    }
    else if (marks >= 35) {
        document.getElementById("result").innerHTML = "Grade D";
    }
    else {
        document.getElementById("result").innerHTML = "Fail";
    }
}
</script>
</body>
</html>
