<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>max between three</title>
</head>
<body>

    <input type="number" id="num1" placeholder="Enter 1st number">
    <input type="number" id="num2" placeholder="Enter 2nd number">
    <input type="number" id="num3" placeholder="Enter 3rd number">


<button onclick="findMax()">Check</button>


<h2 id="result"></h2>

<script>
function findMax()
{
    let num1 = parseInt(document.getElementById("num1").value);
    let num2 = parseInt(document.getElementById("num2").value);
     let num3 = parseInt(document.getElementById("num3").value)

   if(num1 > num2 && num1 > num3)
    {
        document.getElementById("result").innerHTML = num1 + " is Maximum";
    }
       else if(num2 > num1 && num2 > num3)
    {
        document.getElementById("result").innerHTML = num2 + " is Maximum";
    }
    else
    {
        document.getElementById("result").innerHTML=num3+ "is maximum";
    }
}
</script>
    
</body>
</html>
